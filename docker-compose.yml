services:
  postgres:
    image: postgres:16-alpine
    container_name: booksbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: booksbox
      POSTGRES_PASSWORD: booksbox
      POSTGRES_DB: booksbox
    ports:
      - "5432:5432"
    volumes:
      - booksbox-postgres:/var/lib/postgresql/data

volumes:
  booksbox-postgres:
